<!DOCTYPE html>
<html>

<head>
    <script src="../modules/vue.js"></script>
</head>

<body>
    <div id="app">
        <button v-on:click="counter += 1"> click me </button>
        <p> The button above has been clicked {{ counter}} times</p>
    </div>
    <script>
        let example = new Vue({
            el: "#app",
            data: {
                counter: 0
            }
        }); 
    </script>
</body>

</html>
