<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background-color: #f5f5f5;
        }

        .form {
            width: 240px;
            margin: 50px auto;
            border-radius: 6px;
            padding: 20px;
            background-color: #ffffff;
        }
        .form-group {
            margin-bottom: 6px;
        }
        label {
            display: block;
            font-weight: bold;
        }

        input[type='text'] {
            width: 100%;
        }

        select {
            width: 100%;
            height: 27px;
            margin-top: 7px;
        }

        .radio-group label,
        .checkbox-group label {
            font-weight: normal;
            display: inline;
        }

        textarea {
            width: 100%;
        }

        .submit-box {
            /* margin: 0 auto; */
            text-align: center;
            /* display: flex;
            justify-content: center; */
        }
    </style>
</head>

<body>
    <div>
        <form class="form" method="post">
            <div class="form-group">
                <label for="name">用户名</label>
                <input id='name' type="text" name='name' placeholder="请输入用户名" />
            </div>
            <div class="form-group">
                <fieldset>
                    <legend>性别</legend>
                    <div class="radio-group">
                        <input type="radio" name="gender" id="man" value="man" />
                        <label for="man">男</label>
                        <input type="radio" name="gender" id="felman" value="felman" />
                        <label for="felman">女</label>
                        <input type="radio" name="gender" id="unknow" value="unknow" />
                        <label for="unknow">不方便透露</label>
                    </div>
                </fieldset>
            </div>
            <div class="form-group">
                <label for="city">城市</label>
                <select id="city" name="city">
                    <option value="">请选择</option>
                    <option value="beijing">北京</option>
                    <option value="shanghai">上海</option>
                    <option value="shenzhen">深圳</option>
                </select>
            </div>
            <div class="form-group">
                <fieldset>
                    <legend>兴趣爱好</legend>
                    <div class="checkbox-group">
                        <input id = "read" type="checkbox" value="read" name="hobby[]"></input>
                        <label for="read">阅读</label>
                        <input id='music' type="checkbox" value="music" name="hobby[]"></input>
                        <label for="music">音乐</label>
                        <input id='sports' type="checkbox" value="sports" name="hobby[]"></input>
                        <label for="sports">运动</label>
                    </div>
                </fieldset>
            </div>
            <div class="form-groups">
                <label for="beizhu">备注</label>
                <textarea id="beizhu"></textarea>
            </div>
            
            <div class="form-groups">
                <div class="submit-box">
                    <button type="submit">提交</button>
                    <button type="reset">重置</button>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
