<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background-color: #f5f5f5;
        }

        .form {
            width: 240px;
            margin: 50px auto;
            border-radius: 6px;
            padding: 20px;
            background-color: #ffffff;
        }

        label {
            display: block;
            font-weight: bold;
        }
        input {
            width: 100%;
        }

        .radio-group label{
            font-weight: normal;
            display: inline;
        }

    </style>
</head>

<body>
    <div>
        <div class="form">
            <div>
                <label for="name">用户名</label>
                <input type="text" placeholder="请输入用户名" />
            </div>
            <fieldset>
                <legend>性别</legend>
                <div class="radio-group">
                    <input type="radio" name="gender" id="man" value="man" />
                    <label for="man">男</label>
                    <input type="radio" name="gender" id="felman" value="felman" />
                    <label for="felman">女</label>
                    <input type="radio" name="gender" id="unknow" value="unknow" />
                    <label for="unknow">不方便透露</label>
                </div>
            </fieldset>
        </div>
    </div>
</body>

</html>
