<!DOCTYPE html>
<html>
    <head>
        <script src="../../modules/vue.js"></script>
        <style>
            * {
              box-sizing: border-box;  
            }
            body {
                background-color: #f5f5f5;
            }
            form {
                width: 250px;
                margin: 20px auto;
                padding: 6px;
                border-radius: 6px;
                background-color: #ffffff;   
            }
            .form-group {
                margin-bottom: 6px;
            }
            .form-group label {
                display: block;
                font-weight: bold;
                margin-bottom: 4px;
            }

            input[type='text'] {
                width: 100%;
                height: 30px;
            }

            textarea {
                width: 100%;
            }
            select {
                width: 100%;
                height: 27px;
            }

            .gender-box label,
            .hobbies-box label {
                display: inline;
                font-weight: normal;
            }

            legend {
                font-weight: bold;
            }

            .submit-box {
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <form>
                <div class="form-group">
                        <label for="name">用户名</label>
                        <input type='text' id="name" placeholder="3-15个字符" v-model="name"></input>
                </div>
                <div class="form-group">
                    <fieldset>
                        <legend>性别</legend>
                        <div class="gender-box">
                            <input type="radio" v-model=gender id='man' value="man"/>
                            <label for="man">男</label>
                            <input type="radio" v-model=gender id='felman' value="felman"/>
                            <label for="felman">女</label>
                            <input type="radio" v-model=gender id="unknow" value="">
                            <label for="unknow">不方便透露</label>
                        </div>
                    </fieldset>
                </div>
                <div class="form-group">
                    <fieldset>
                        <legend>城市</legend>
                        <div class="city-box">
                            <select v-model="city">
                                <option value="">请选择</option>
                                <option value="beijing">北京</option>
                                <option value="shanghai">上海</option>
                                <option value="shenzhen">深圳</option>
                            </select>
                        </div>
                    </fieldset>
                </div>
                <div class="form-group">
                    <fieldset>
                        <legend>兴趣爱好</legend>
                        <div class="hobbies-box">
                            <input type="checkbox" v-model="hobbies" id="read" value="read"/>
                            <label>阅读</label>
                            <input type="checkbox" v-model="hobbies" id="music" value="music"/>
                            <label>音乐</label>
                            <input type="checkbox" v-model="hobbies" id="sports" value="sports"/>
                            <label>运动</label>
                        </div>
                    </fieldset>
                </div>
                <div class="form-group">
                    <label for="remarks">备注</label>
                    <textarea id="remarks" v-model="remarks"></textarea>
                </div>
                <div class="form-group">
                    <div class="submit-box">
                        <button type="submit" @click.prevent="submit">提交</button>
                        <button type="reset">重置</button>
                    </div>
                </div>
            </form>
        </div>
        <script>
            let vue = new Vue({
                el:"#app",
                data: {
                  name:"",
                  gender:"",
                  city:"",
                  hobbies:[],
                  remarks:""
                },
                methods: {
                    submit() {
                        console.log('submit over');
                    }
                }
            });
        </script>
    </body>
</html>
